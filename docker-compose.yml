services:

  # PostgreSQL 데이터베이스 컨테이너
  postgres:
    image: postgres:15
    container_name: postgres-container
  #  network_mode: "host"
    environment:
      POSTGRES_DB: samuel_postgresql_db
      POSTGRES_USER: samuel
      POSTGRES_PASSWORD: csj2641081
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      PGUSER: samuel
    ports:
      - "45433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
   # networks:
     # - app-network
    restart: unless-stopped
    stop_grace_period: 30s
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samuel -d samuel_postgresql_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


