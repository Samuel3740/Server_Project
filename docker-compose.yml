  # 컨테이너 1 - PostgreSQL 연결 애플리케이션
  a1:
    build:
      context: ./a1
      dockerfile: Dockerfile
    container_name: a1-container
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://samuel:csj2641081k!postgresql@postgres:5432/samuel_postgresql_db
      - PORT=3000
      - APP_NAME=PostgreSQL App
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./a1:/app
      - /app/node_modules


  # 컨테이너 2 - 날씨 크롤러 애플리케이션
  crawler_weather:
    build:
      context: ./crawler_weather
      dockerfile: Dockerfile
    container_name: crawler_weather-container
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=samuel_postgresql_db
      - POSTGRES_USER=samuel
      - POSTGRES_PASSWORD=csj2641081k!postgresql
    volumes:
      - ./crawler_weather:/app
    command: ["tail", "-f", "/dev/null"]  # 현재는 main.py 미작성 상태이므로 대기
    restart: unless-stopped
    networks:
      - app-network



